name: Deploy Web Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build WASM (release)
        working-directory: crates/cc_client
        run: trunk build --release --cargo-profile wasm-release

      - name: Deploy to OVH2
        env:
          SSH_KEY: ${{ secrets.OVH2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 15.204.59.61 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ ubuntu@15.204.59.61:/opt/clawed/site/
          rm -f ~/.ssh/deploy_key
