      width: 128
      height: 128
      direction: south-east
      extra_notes: Stealth scout. Should look sneaky and fast. Dark coloring. Shadow Network visual — faint connecting lines between paired Mousers.
    output:
      type: single
      game_path: assets/sprites/units/mouser_idle.png
  catnapper_idle:
    template: unit_static
    status: planned
    params:
      name: Catnapper
      pose: curled up sleeping, Zzz floating above
      description: Cat siege unit curled up asleep. Zzz symbols floating above. Looks completely
