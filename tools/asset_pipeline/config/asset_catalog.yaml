terrain:
  grass:
    template: terrain
    status: planned
    params:
      tile_type: grass
      description: Lush green grass, standard passable terrain. Redwall-style pastoral meadow.
      width: 128
      height: 128
      extra_notes: "Base tile — most common terrain. Subtle grass texture variation."
    output:
      type: single
      game_path: assets/sprites/terrain/grass.png
  dirt:
    template: terrain
    status: planned
    params:
      tile_type: dirt path
      description: Worn dirt path or cleared ground, paw prints visible
      width: 128
      height: 128
      extra_notes: Should contrast clearly with grass tiles.
    output:
      type: single
      game_path: assets/sprites/terrain/dirt.png
  stone:
    template: terrain
    status: planned
    params:
      tile_type: stone/rock
      description: Rocky terrain, impassable cliff surface with old-world concrete fragments
      width: 128
      height: 128
      extra_notes: Impassable tile. Visually heavier/darker than passable tiles.
    output:
      type: single
      game_path: assets/sprites/terrain/stone.png
  water:
    template: terrain
    status: planned
    params:
      tile_type: water
      description: Shallow water, impassable. Fish visible beneath surface.
      width: 128
      height: 128
      extra_notes: Slightly reflective surface. Impassable. Fish hint at Food resource.
    output:
      type: single
      game_path: assets/sprites/terrain/water.png
  sand:
    template: terrain
    status: planned
    params:
      tile_type: sand
      description: Sandy terrain at water edges
      width: 128
      height: 128
      extra_notes: Transition tile between grass/dirt and water.
    output:
      type: single
      game_path: assets/sprites/terrain/sand.png
buildings:
  the_box:
    template: building
    status: planned
    params:
      name: The Box
      description: Command center. A large cardboard box — sacred to all cats. Reinforced with
        duct tape and covered in territorial scratch marks. Antenna array pokes out the top.
      faction: The Clawed Dominion (cats)
      width: 256
      height: 256
      footprint: 3x3
      extra_notes: "Most important building — should be the visual anchor of any base. Clearly a cardboard box but imposing."
    output:
      type: single
      game_path: assets/sprites/buildings/the_box.png
  cat_tree:
    template: building
    status: planned
    params:
      name: Cat Tree
      description: Barracks / infantry training facility. Multi-level cat tree tower with platforms,
        scratching posts, and dangling toys repurposed as training equipment.
      faction: The Clawed Dominion (cats)
      width: 192
      height: 192
      footprint: 2x2
      extra_notes: Units deploy from the bottom level. Should look climbable and functional.
    output:
      type: single
      game_path: assets/sprites/buildings/cat_tree.png
  fish_market:
    template: building
    status: planned
    params:
      name: Fish Market
      description: Resource depot. Open-air market stall with fish barrels, hanging dried fish,
        and a counter where Pawdlers deposit gathered food.
      faction: The Clawed Dominion (cats)
      width: 192
      height: 192
      footprint: 2x2
      extra_notes: Pawdlers deliver Food here. Should look like a bustling market.
    output:
      type: single
      game_path: assets/sprites/buildings/fish_market.png
  server_rack:
    template: building
    status: planned
    params:
      name: Server Rack
      description: Tech building. Old-world server rack covered in cat hair, blinking LEDs,
        tangled cables. Cats have clearly been sleeping on it.
      faction: The Clawed Dominion (cats)
      width: 192
      height: 192
      footprint: 2x2
      extra_notes: GPU Core processing. Glowing LED accents. Cat hair tufts visible.
    output:
      type: single
      game_path: assets/sprites/buildings/server_rack.png
  scratching_post:
    template: building
    status: planned
    params:
      name: Scratching Post
      description: Research building. A tall, heavily scratched sisal post with blueprints and
        tech diagrams pinned to it. Cats scratch it to think.
      faction: The Clawed Dominion (cats)
      width: 192
      height: 192
      footprint: 2x2
      extra_notes: Upgrades and tech unlocks. Should look intellectual but cat-like.
    output:
      type: single
      game_path: assets/sprites/buildings/scratching_post.png
  litter_box:
    template: building
    status: planned
    params:
      name: Litter Box
      description: Supply depot. A large covered litter box repurposed as storage. Crates
        and supplies stacked around and inside it.
      faction: The Clawed Dominion (cats)
      width: 128
      height: 128
      footprint: 2x2
      extra_notes: Increases supply cap. The name is intentional.
    output:
      type: single
      game_path: assets/sprites/buildings/litter_box.png
  cat_flap:
    template: building
    status: planned
    params:
      name: Cat Flap
      description: Defensive gate. A reinforced cat flap built into a wall segment. Units
        garrison inside the wall.
      faction: The Clawed Dominion (cats)
      width: 192
      height: 192
      footprint: 2x2
      extra_notes: Defensive structure. Units can garrison inside. Should look fortified but cat-themed.
    output:
      type: single
      game_path: assets/sprites/buildings/cat_flap.png
  laser_pointer:
    template: building
    status: planned
    params:
      name: Laser Pointer
      description: Defense tower. A mounted laser pointer on a swivel base, repurposed as
        a weapon. Red laser beam visible.
      faction: The Clawed Dominion (cats)
      width: 128
      height: 192
      footprint: 1x1
      extra_notes: Shoots a laser beam at enemies. Cats are fascinated by it.
    output:
      type: single
      game_path: assets/sprites/buildings/laser_pointer.png
units:
  pawdler_idle:
    template: unit_static
    status: planned
    params:
      name: Pawdler
      pose: idle standing, slightly slouched, reluctant posture
      description: Cat worker unit. Tabby cat in a tiny hard hat, holding a fish basket. Looks
        like it would rather be napping.
      width: 128
      height: 128
      direction: south-east
      extra_notes: Should look civilian/reluctant, not combat-oriented. Cute but lazy.
    output:
      type: single
      game_path: assets/sprites/units/pawdler_idle.png
  pawdler_walk:
    template: unit_sheet
    status: planned
    params:
      name: Pawdler
      animation: walk cycle
      description: Pawdler cat trudging along with fish basket, reluctant gait
      frame_count: 4
      frame_width: 128
      frame_height: 128
      sheet_width: 512
      direction: south-east
      extra_notes: Subtle lazy walk cycle. Basket sways slightly.
    output:
      type: sheet
      columns: 4
      rows: 1
      tile_size:
      - 128
      - 128
      game_path: assets/sprites/units/pawdler_walk.png
  nuisance_idle:
    template: unit_static
    status: planned
    params:
      name: The Nuisance
      pose: crouched, ready to pounce, mischievous expression
      description: Small scrappy cat in light harasser stance. Looks annoyingly persistent.
        Spiky fur, wide eyes, ready to dart.
      width: 128
      height: 128
      direction: south-east
      extra_notes: Core light combat unit. Should look fast and irritating.
    output:
      type: single
      game_path: assets/sprites/units/nuisance_idle.png
  nuisance_walk:
    template: unit_sheet
    status: planned
    params:
      name: The Nuisance
      animation: walk cycle
      description: Nuisance cat darting forward in quick, annoying movements
      frame_count: 4
      frame_width: 128
      frame_height: 128
      sheet_width: 512
      direction: south-east
      extra_notes: Quick, jittery movement. Tail twitching.
    output:
      type: sheet
      columns: 4
      rows: 1
      tile_size:
      - 128
      - 128
      game_path: assets/sprites/units/nuisance_walk.png
  nuisance_attack:
    template: unit_sheet
    status: planned
    params:
      name: The Nuisance
      animation: attack / swipe
      description: Nuisance cat swiping at enemy with claws
      frame_count: 4
      frame_width: 128
      frame_height: 128
      sheet_width: 512
      direction: south-east
      extra_notes: "Quick swipe → recoil → ready. Should look annoying, not deadly."
    output:
      type: sheet
      columns: 4
      rows: 1
      tile_size:
      - 128
      - 128
      game_path: assets/sprites/units/nuisance_attack.png
  chonk_idle:
    template: unit_static
    status: planned
    params:
      name: The Chonk
      pose: sitting, immovable, taking up space
      description: Very fat cat sitting firmly on the ground. Enormous, round, unbothered.
        Too large to move easily but impossible to move by force.
      width: 148
      height: 148
      direction: south-east
      extra_notes: Visually larger than other units. Should look immovable and content.
    output:
      type: single
      game_path: assets/sprites/units/chonk_idle.png
  flying_fox_idle:
    template: unit_static
    status: planned
    params:
      name: Flying Fox
      pose: hovering in air, wings spread
      description: Fruit bat allied with the cat faction. Large eyes, leathery wings spread,
        small body. Friendly but alert expression.
      width: 128
      height: 128
      direction: south-east
      extra_notes: Air unit — should visually read as airborne. Wings are key silhouette.
    output:
      type: single
      game_path: assets/sprites/units/flying_fox_idle.png
  hisser_idle:
    template: unit_static
    status: planned
    params:
      name: Hisser
      pose: arched back, hissing, disgusted expression
      description: Cat ranged unit with arched back and bared teeth. Looks perpetually disgusted.
        Spits at enemies from range.
      width: 128
      height: 128
      direction: south-east
      extra_notes: Medium-range unit. Should look hostile and disgusted.
    output:
      type: single
      game_path: assets/sprites/units/hisser_idle.png
  yowler_idle:
    template: unit_static
    status: planned
    params:
      name: Yowler
      pose: mouth wide open, yowling
      description: Cat support unit mid-yowl. Mouth wide open, eyes squeezed shut, projecting
        sound waves. Nearby allies look energized.
      width: 128
      height: 128
      direction: south-east
      extra_notes: Support unit. Sound wave visual effect around it. Thematic link to voice commands.
    output:
      type: single
      game_path: assets/sprites/units/yowler_idle.png
  mouser_idle:
    template: unit_static
    status: planned
    params:
      name: Mouser
      pose: low crouch, stalking, nearly invisible
      description: Sleek black cat in stealth crouch. Almost invisible. Eyes gleaming in the
        dark. Built for scouting.
      width: 128
      height: 128
      direction: south-east
      extra_notes: Stealth scout. Should look sneaky and fast. Dark coloring.
    output:
      type: single
      game_path: assets/sprites/units/mouser_idle.png
  catnapper_idle:
    template: unit_static
    status: planned
    params:
      name: Catnapper
      pose: curled up sleeping, Zzz floating above
      description: Cat siege unit curled up asleep. Zzz symbols floating above. Looks completely
        harmless but is devastating to buildings.
      width: 128
      height: 128
      direction: south-east
      extra_notes: "Siege unit. Sleeps on buildings until they collapse. Should look adorably harmless."
    output:
      type: single
      game_path: assets/sprites/units/catnapper_idle.png
  ferret_sapper_idle:
    template: unit_static
    status: planned
    params:
      name: Ferret Sapper
      pose: standing alert with explosives, slightly manic expression
      description: Ferret ally carrying oversized demolition charges. Wiry, energetic, slightly
        unhinged expression. Wearing a tiny helmet.
      width: 128
      height: 128
      direction: south-east
      extra_notes: Demolitions unit. Should look dangerous and excited about it.
    output:
      type: single
      game_path: assets/sprites/units/ferret_sapper_idle.png
  mech_commander_idle:
    template: unit_static
    status: planned
    params:
      name: Mech Commander
      pose: standing in oversized mech suit, cat visible in cockpit
      description: Late-game hero unit. A small cat piloting an oversized mech suit. The cat
        is clearly too small for it. Mech has weapon arms and command antenna.
      width: 192
      height: 192
      direction: south-east
      extra_notes: Hero/heavy unit. Cat is comically small inside the mech. Imposing but funny.
    output:
      type: single
      game_path: assets/sprites/units/mech_commander_idle.png
resources:
  fish_pond:
    template: resource
    status: planned
    params:
      name: Fish Pond
      description: Small pond teeming with fish. Splashing visible. Primary Food source for
        the cat faction.
      width: 128
      height: 128
      extra_notes: Primary resource (Food). Should look harvestable. Fish jumping out.
    output:
      type: single
      game_path: assets/sprites/resources/fish_pond.png
  berry_bush:
    template: resource
    status: planned
    params:
      name: Berry Bush
      description: Wild berry bush with bright red/purple berries. Secondary Food source.
      width: 128
      height: 128
      extra_notes: Secondary Food source. Colorful berries clearly visible.
    output:
      type: single
      game_path: assets/sprites/resources/berry_bush.png
  gpu_deposit:
    template: resource
    status: planned
    params:
      name: GPU Deposit
      description: Old-world tech ruin with exposed circuit boards and glowing GPU chips protruding
        from rubble. Green/blue tech glow.
      width: 128
      height: 128
      extra_notes: GPU Cores resource. Should look technological and harvestable. Glowing accents.
    output:
      type: single
      game_path: assets/sprites/resources/gpu_deposit.png
  monkey_mine:
    template: resource
    status: planned
    params:
      name: Monkey Mine
      description: Neutral structure guarded by feral monkeys. Old data center entrance covered
        in monkey graffiti and banana peels. NFT symbols scratched into the walls.
      width: 192
      height: 192
      extra_notes: "Neutral objective — capture for NFT generation. Should look contested and ancient."
    output:
      type: single
      game_path: assets/sprites/resources/monkey_mine.png
projectiles:
  spit:
    template: projectile
    status: planned
    params:
      name: Spit
      description: Disgusted cat spit projectile for Hisser ranged attacks
      width: 32
      height: 16
      frame_count: 1
      extra_notes: Gross but readable. Green-tinged.
    output:
      type: single
      game_path: assets/sprites/projectiles/spit.png
  laser_beam:
    template: projectile
    status: planned
    params:
      name: Laser Beam
      description: Red laser beam from Laser Pointer defense tower
      width: 48
      height: 8
      frame_count: 1
      extra_notes: Bright red laser line. Cats would chase this.
    output:
      type: single
      game_path: assets/sprites/projectiles/laser_beam.png
  explosive:
    template: projectile
    status: planned
    params:
      name: Explosive Charge
      description: Thrown explosive charge from Ferret Sapper demolitions unit
      width: 40
      height: 40
      frame_count: 1
      extra_notes: Cartoonish bomb with lit fuse. Tumbles through the air.
    output:
      type: single
      game_path: assets/sprites/projectiles/explosive.png
