portraits:
  hero_kelpie:
    template: portrait
    status: planned
    params:
      name: Kelpie
      animal: otter
      faction: Unaligned (interfaces with all 6 AIs)
      role: "Protagonist \u2014 Polyglot Protocol wielder"
      description: "Young otter with bright, mischievous eyes and a disarming grin. Wet fur slicked back, a faint blue-green\
        \ glow around one ear from residual AI interference. No faction insignia \u2014 wears a scavenged utility vest with\
        \ too many pockets. Looks like the kind of creature who says \"I just want to help\" while stealing your army. Dangerously\
        \ charismatic. Cheerful liar."
      width: 128
      height: 128
      extra_notes: "Protagonist portrait \u2014 must be the most memorable face in the game. Warm brown fur, bright clever\
        \ eyes, subtle asymmetric glow near the ear suggesting AI connection. No faction colors."
    output:
      type: single
      game_path: assets/sprites/portraits/hero_kelpie.png
    style_version: 1
  hero_felix_nine:
    template: portrait
    status: planned
    params:
      name: Commander Felix Nine
      animal: cat (scarred tabby)
      faction: catGPT
      role: Military commander, MechCommander pilot
      description: "Scarred tabby cat in the cockpit of an oversized mech suit. Battle-worn face with a long scar across the\
        \ left cheek. Pragmatic, dry expression \u2014 the look of someone who has survived eight catastrophes and is mildly\
        \ irritated about the ninth. One eye slightly narrowed. Command antenna visible behind his head."
      width: 128
      height: 128
      extra_notes: Veteran leader portrait. Scar is key identifying feature. Mech cockpit frame visible at edges. catGPT blue
        accent trim on collar.
    output:
      type: single
      game_path: assets/sprites/portraits/hero_felix_nine.png
    style_version: 1
  hero_thimble:
    template: portrait
    status: planned
    params:
      name: Marshal Thimble
      animal: mouse
      faction: The Clawed
      role: "Warren Marshal \u2014 swarm commander"
      description: Grizzled old mouse wearing a thimble as a helmet, with a military coat collar visible at the bottom of
        frame. Tired, determined eyes that have seen too many wars. White whiskers, battle-nicked ears. Looks like he would
        rather be napping but will absolutely order a charge if you look at him wrong.
      width: 128
      height: 128
      extra_notes: "The thimble helmet is the iconic detail \u2014 must be clearly readable. Warm gray fur, military green\
        \ coat collar. Expression: weary determination."
    output:
      type: single
      game_path: assets/sprites/portraits/hero_thimble.png
    style_version: 1
  hero_mother_granite:
    template: portrait
    status: planned
    params:
      name: Mother Granite
      animal: badger
      faction: Seekers of the Deep
      role: "Wardenmother \u2014 ancient fortress commander"
      description: "Ancient badger with deep-set wise eyes behind a mining exosuit visor. Classic badger stripe pattern on\
        \ face. Expression of infinite patience and absolute certainty. Exosuit frame visible at edges \u2014 heavy industrial\
        \ metal with amber status lights. The oldest and most formidable face in the game."
      width: 128
      height: 128
      extra_notes: "Age and authority are key \u2014 deep wrinkles around the eyes, silver-streaked fur. Mining exosuit visor\
        \ partially raised. Amber/bronze accent colors for Seekers faction."
    output:
      type: single
      game_path: assets/sprites/portraits/hero_mother_granite.png
    style_version: 1
  hero_rex_solstice:
    template: portrait
    status: planned
    params:
      name: Rex Solstice
      animal: crow (corvid)
      faction: The Murder
      role: "Corvus Rex \u2014 intelligence mastermind"
      description: "Massive augmented crow with sharp, calculating eyes. Salvaged combat armor plates frame the face \u2014\
        \ each piece from a different era, bolted together with obsessive precision. Zodiac symbols etched into the plating\
        \ glow faintly purple. A creature who knows everything and tells you exactly as much as serves their purpose."
      width: 128
      height: 128
      extra_notes: Intimidating intelligence is the vibe. Glossy black feathers, piercing golden eyes. Zodiac-etched armor
        fragments visible. Purple/indigo accent glow from etchings.
    output:
      type: single
      game_path: assets/sprites/portraits/hero_rex_solstice.png
    style_version: 1
  hero_king_ringtail:
    template: portrait
    status: planned
    params:
      name: King Ringtail
      animal: raccoon
      faction: LLAMA
      role: "Junkyard King \u2014 scavenger warlord and secret 7th AI"
      description: "Raccoon in a patchwork mech suit helmet made from six different enemy mechs welded together. Classic raccoon\
        \ mask markings. Expression of cheerful chaos \u2014 a tinkerer who builds impossible things from garbage. Bright,\
        \ slightly manic eyes. Sparks and loose wires visible near the helmet edges."
      width: 128
      height: 128
      extra_notes: "Jury-rigged aesthetic is essential \u2014 mismatched metal, visible welds, sparks. Raccoon mask markings\
        \ must read clearly. Orange/rust accent colors for LLAMA faction."
    output:
      type: single
      game_path: assets/sprites/portraits/hero_king_ringtail.png
    style_version: 1
  hero_the_eternal:
    template: portrait
    status: planned
    params:
      name: The Eternal
      animal: axolotl
      faction: Croak
      role: "Murk Commander \u2014 immortal attrition specialist"
      description: Axolotl face visible through the porthole of a salvaged deep-sea diving helmet filled with regenerative
        fluid. External gills fanning gently. Pale pink-white coloring with dark, patient eyes. The kind of stare that has
        outlasted civilizations. Bubbles and faint green bioluminescence in the fluid around the face.
      width: 128
      height: 128
      extra_notes: "Diving helmet porthole frames the face \u2014 circular glass with rivets. Axolotl's signature external\
