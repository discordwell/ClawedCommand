        el.classList.add('active');
      };
    });

    // Select tool entity editing
    const selX = panel.querySelector('[data-action="sel-x"]');
    const selY = panel.querySelector('[data-action="sel-y"]');
    const selPid = panel.querySelector('[data-action="sel-pid"]');
    const selPb = panel.querySelector('[data-action="sel-prebuilt"]');
    const selMc = panel.querySelector('[data-action="sel-mc"]');
    const selDel = panel.querySelector('[data-action="sel-delete"]');

    if (selX && this.selectedEntity) {
      selX.onchange = () => { this.selectedEntity.data.x = parseInt(selX.value) || 0; this._render(); };
    }
    if (selY && this.selectedEntity) {
      selY.onchange = () => { this.selectedEntity.data.y = parseInt(selY.value) || 0; this._render(); };
    }
    if (selPid && this.selectedEntity) {
      selPid.onchange = () => { this.selectedEntity.data.player_id = parseInt(selPid.value) || 0; this._render(); };
    }
    if (selPb && this.selectedEntity) {
      selPb.onchange = () => { this.selectedEntity.data.pre_built = selPb.checked; };
    }
    if (selMc && this.selectedEntity) {
      selMc.onchange = () => { this.selectedEntity.data.mission_critical = selMc.checked; };
    }
    if (selDel && this.selectedEntity) {
      selDel.onclick = () => {
        this.undo.snapshot(this.state);
        this.state.removeEntity(this.selectedEntity.type, this.selectedEntity.idx);
        this.selectedEntity = null;
        this._updatePanel();
        this._render();
      };
    }

    // Mission panel events
    this._bindMissionEvents(panel);
  }

  _bindMissionEvents(panel) {
    const s = this.state;
    const bind = (action, handler) => {
      const el = panel.querySelector(`[data-action="${action}"]`);
      if (el) {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
          el.onchange = () => handler(el);
        } else {
          el.onclick = () => handler(el);
        }
      }
    };

    bind('m-id', el => { s.id = el.value; });
    bind('m-name', el => { s.name = el.value; });
    bind('m-act', el => { s.act = parseInt(el.value) || 0; });
    bind('m-idx', el => { s.mission_index = parseInt(el.value) || 0; });
    bind('m-briefing', el => { s.briefing_text = el.value; });
    bind('m-debrief', el => { s.debrief_text = el.value; });
    bind('m-food', el => { s.starting_food = parseInt(el.value) || 0; });
    bind('m-gpu', el => { s.starting_gpu = parseInt(el.value) || 0; });
    bind('m-nfts', el => { s.starting_nfts = parseInt(el.value) || 0; });
    bind('m-tier', el => { s.ai_tool_tier = el.value === '' ? null : parseInt(el.value); });
    bind('m-next-type', el => {
      s.next_mission = {type: el.value};
      this._updatePanel();
    });
    bind('m-next-id', el => { s.next_mission.id = el.value; });
    bind('m-next-flag', el => { s.next_mission.flag = el.value; });
    bind('m-next-true', el => { s.next_mission.on_true = el.value; });
    bind('m-next-false', el => { s.next_mission.on_false = el.value; });
    bind('m-resize', () => {
      const w = parseInt(panel.querySelector('[data-action="m-width"]').value) || s.width;
      const h = parseInt(panel.querySelector('[data-action="m-height"]').value) || s.height;
      this.undo.snapshot(s);
      s.resize(Math.max(8, Math.min(256, w)), Math.max(8, Math.min(256, h)));
      this.renderer.centerOnMap(s);
      this._render();
    });

    // Wave CRUD
    bind('add-wave', () => {
      s.enemy_waves.push({wave_id: 'wave_' + s.enemy_waves.length, trigger: {type: 'Immediate'}, units: [], ai_behavior: {type: 'Idle'}});
      this._updatePanel();
    });
    panel.querySelectorAll('[data-action="del-wave"]').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); s.enemy_waves.splice(parseInt(el.dataset.idx), 1); this._updatePanel(); };
    });
    panel.querySelectorAll('[data-action="edit-wave"]').forEach(el => {
      el.onclick = () => this._editWave(parseInt(el.dataset.idx));
    });

    // Objective CRUD
    bind('add-obj', () => {
      s.objectives.push({id: 'obj_' + s.objectives.length, description: 'New objective', primary: true, condition: {type: 'EliminateAll'}});
      this._updatePanel();
    });
    panel.querySelectorAll('[data-action="del-obj"]').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); s.objectives.splice(parseInt(el.dataset.idx), 1); this._updatePanel(); };
    });
    panel.querySelectorAll('[data-action="edit-obj"]').forEach(el => {
      el.onclick = () => this._editObjective(parseInt(el.dataset.idx));
    });

    // Trigger CRUD
    bind('add-trigger', () => {
      s.triggers.push({id: 'trigger_' + s.triggers.length, condition: {type: 'AllEnemiesDead'}, actions: [], once: true});
      this._updatePanel();
    });
    panel.querySelectorAll('[data-action="del-trigger"]').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); s.triggers.splice(parseInt(el.dataset.idx), 1); this._updatePanel(); };
    });
    panel.querySelectorAll('[data-action="edit-trigger"]').forEach(el => {
      el.onclick = () => this._editTrigger(parseInt(el.dataset.idx));
    });

    // Dialogue CRUD
    bind('add-dialogue', () => {
      s.dialogue.push({speaker: '', text: '', voice_style: 'Normal', portrait: ''});
      this._updatePanel();
    });
    panel.querySelectorAll('[data-action="del-dialogue"]').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); s.dialogue.splice(parseInt(el.dataset.idx), 1); this._updatePanel(); };
    });
    panel.querySelectorAll('[data-action="edit-dialogue"]').forEach(el => {
      el.onclick = () => this._editDialogue(parseInt(el.dataset.idx));
    });

    // Mutator CRUD
    bind('add-mutator', () => {

  _editWave(idx) {
    const w = this.state.enemy_waves[idx];

    const overlay = document.createElement('div');
    overlay.className = 'dialog-overlay';

    const triggerOpts = WAVE_TRIGGER_TYPES.map(t =>
      `<option value="${t}"${t === w.trigger.type ? ' selected' : ''}>${t}</option>`
    ).join('');
    const behaviorOpts = WAVE_AI_BEHAVIORS.map(b =>
      `<option value="${b}"${b === (w.ai_behavior.type || w.ai_behavior) ? ' selected' : ''}>${b}</option>`
    ).join('');

    let unitListHtml = w.units.map((u, i) =>
      `<div class="list-item"><span>${u.kind} @ (${u.position.x},${u.position.y}) P${u.player_id}</span><span class="del-btn" data-delidx="${i}">x</span></div>`
    ).join('');

    overlay.innerHTML = `
      <div class="dialog" style="min-width:400px;max-height:80vh;overflow-y:auto">
        <h3>Edit Wave: ${w.wave_id}</h3>
        <label>Wave ID:</label><input id="we-id" value="${esc(w.wave_id)}">
        <label>Trigger Type:</label><select id="we-trigger">${triggerOpts}</select>
        <div id="we-trigger-extra"></div>
        <label>AI Behavior:</label><select id="we-behavior">${behaviorOpts}</select>
        <div id="we-behavior-extra"></div>
        <label>Units (${w.units.length}):</label>
        <div id="we-units">${unitListHtml}</div>
        <div class="panel-row" style="margin-top:4px">
          <select id="we-add-kind">${ALL_UNIT_KINDS.map(u => `<option>${u}</option>`).join('')}</select>
          <input type="number" id="we-add-x" value="0" style="width:40px" placeholder="x">
          <input type="number" id="we-add-y" value="0" style="width:40px" placeholder="y">
          <input type="number" id="we-add-pid" value="1" style="width:40px" placeholder="pid">
          <button class="btn" id="we-add-unit">+</button>
        </div>
        <div style="margin-top:12px">
          <button class="btn btn-accent" id="we-save">Save</button>
          <button class="btn" id="we-cancel">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const updateTriggerExtra = () => {
      const tt = overlay.querySelector('#we-trigger').value;
      const ext = overlay.querySelector('#we-trigger-extra');
      if (tt === 'AtTick') ext.innerHTML = `<input type="number" id="we-trigger-tick" value="${w.trigger.tick || 0}" placeholder="tick">`;
      else if (tt === 'OnTrigger') ext.innerHTML = `<input id="we-trigger-tid" value="${esc(w.trigger.trigger_id || '')}" placeholder="trigger_id">`;
      else ext.innerHTML = '';
    };
    const updateBehaviorExtra = () => {
      const bt = overlay.querySelector('#we-behavior').value;
      const ext = overlay.querySelector('#we-behavior-extra');
      if (bt === 'AttackMove') ext.innerHTML = `<div class="panel-row"><input type="number" id="we-beh-x" value="${w.ai_behavior.x || 0}" style="width:50px" placeholder="x"><input type="number" id="we-beh-y" value="${w.ai_behavior.y || 0}" style="width:50px" placeholder="y"></div>`;
      else ext.innerHTML = '';
    };
    updateTriggerExtra();
    updateBehaviorExtra();
    overlay.querySelector('#we-trigger').onchange = updateTriggerExtra;
    overlay.querySelector('#we-behavior').onchange = updateBehaviorExtra;

    overlay.querySelector('#we-add-unit').onclick = () => {
      const kind = overlay.querySelector('#we-add-kind').value;
      const x = parseInt(overlay.querySelector('#we-add-x').value) || 0;
      const y = parseInt(overlay.querySelector('#we-add-y').value) || 0;
      const pid = parseInt(overlay.querySelector('#we-add-pid').value) || 0;
      w.units.push({kind, position: {x, y}, player_id: pid});
      // Re-render units list
      overlay.querySelector('#we-units').innerHTML = w.units.map((u, i) =>
        `<div class="list-item"><span>${u.kind} @ (${u.position.x},${u.position.y}) P${u.player_id}</span><span class="del-btn" data-delidx="${i}">x</span></div>`
      ).join('');
      bindUnitDel();
    };

    const bindUnitDel = () => {
      overlay.querySelectorAll('[data-delidx]').forEach(el => {
        el.onclick = () => {
          w.units.splice(parseInt(el.dataset.delidx), 1);
          overlay.querySelector('#we-units').innerHTML = w.units.map((u, i) =>
            `<div class="list-item"><span>${u.kind} @ (${u.position.x},${u.position.y}) P${u.player_id}</span><span class="del-btn" data-delidx="${i}">x</span></div>`
          ).join('');
          bindUnitDel();
        };
      });
    };
    bindUnitDel();

    overlay.querySelector('#we-save').onclick = () => {
      w.wave_id = overlay.querySelector('#we-id').value;
      const tt = overlay.querySelector('#we-trigger').value;
      if (tt === 'AtTick') w.trigger = {type: 'AtTick', tick: parseInt(overlay.querySelector('#we-trigger-tick')?.value) || 0};
      else if (tt === 'OnTrigger') w.trigger = {type: 'OnTrigger', trigger_id: overlay.querySelector('#we-trigger-tid')?.value || ''};
      else w.trigger = {type: 'Immediate'};

      const bt = overlay.querySelector('#we-behavior').value;
      if (bt === 'AttackMove') w.ai_behavior = {type: 'AttackMove', x: parseInt(overlay.querySelector('#we-beh-x')?.value) || 0, y: parseInt(overlay.querySelector('#we-beh-y')?.value) || 0};
      else w.ai_behavior = {type: bt};

      document.body.removeChild(overlay);
      this._updatePanel();
      this._render();
    };
    overlay.querySelector('#we-cancel').onclick = () => document.body.removeChild(overlay);
  }

      else if (ct === 'HazardLevel') ext.innerHTML = `<input id="te-htype" value="${esc(t.condition.hazard_type||'')}" placeholder="type"><input type="number" id="te-hlevel" value="${t.condition.level||0}" placeholder="level">`;

      else ext.innerHTML = '';

      ).join('');

      if (aType === 'SpawnWave') newAction.wave_id = '';
      if (aType === 'SetFlag') newAction.flag = '';
      if (aType === 'CompleteObjective') newAction.objective_id = '';

      refreshActions();

      else if (ct === 'TriggerFired') t.condition = {type: ct, trigger_id: overlay.querySelector('#te-tid')?.value || ''};
      else if (ct === 'PersistentFlag') t.condition = {type: ct, flag: overlay.querySelector('#te-pflag')?.value || ''};
      else if (ct === 'HeroAtPos') t.condition = {type: ct, hero: overlay.querySelector('#te-hero')?.value || '', x: parseInt(overlay.querySelector('#te-px')?.value) || 0, y: parseInt(overlay.querySelector('#te-py')?.value) || 0, radius: parseInt(overlay.querySelector('#te-pr')?.value) || 3};
      else if (ct === 'HeroHpBelow') t.condition = {type: ct, hero: overlay.querySelector('#te-hero')?.value || '', percentage: parseInt(overlay.querySelector('#te-pct')?.value) || 50};
      else if (ct === 'HazardLevel') t.condition = {type: ct, hazard_type: overlay.querySelector('#te-htype')?.value || '', level: parseInt(overlay.querySelector('#te-hlevel')?.value) || 0};

      else t.condition = {type: ct};

      else if (mt === 'Flooding') ext.innerHTML = `<label>Interval Ticks:</label><input type="number" id="me-int" value="${m.interval_ticks||60}"><label>Initial Level:</label><input type="number" id="me-il" value="${m.initial_water_level||0}" min="0" max="3"><label>Max Level:</label><input type="number" id="me-ml" value="${m.max_water_level||3}" min="0" max="3"><label>Initial Delay:</label><input type="number" id="me-delay" value="${m.initial_delay_ticks||0}">`;
      else if (mt === 'WindStorm') ext.innerHTML = `<label>Direction:</label><select id="me-dir">${dirOpts(m.direction)}</select><label>Force:</label><input type="number" id="me-force" value="${m.force||1}"><label>Interval Ticks:</label><input type="number" id="me-int" value="${m.interval_ticks||50}"><label>Duration Ticks:</label><input type="number" id="me-dur" value="${m.duration_ticks||10}"><label>Push Off Map:</label><input type="checkbox" id="me-pom" ${m.can_push_off_map?'checked':''}><label>Initial Delay:</label><input type="number" id="me-delay" value="${m.initial_delay_ticks||0}">`;
      else if (mt === 'ToxicTide') ext.innerHTML = `<label>Interval Ticks:</label><input type="number" id="me-int" value="${m.interval_ticks||40}"><label>Dmg/Tick:</label><input type="number" id="me-dmg" value="${m.damage_per_tick||5}"><label>Rows/Wave:</label><input type="number" id="me-rpw" value="${m.rows_per_wave||1}"><label>Initial Delay:</label><input type="number" id="me-delay" value="${m.initial_delay_ticks||0}"><label>Min Safe Radius:</label><input type="number" id="me-msr" value="${m.min_safe_radius||8}">`;
      else if (mt === 'VoiceOnlyControl') ext.innerHTML = `<label>AI Enabled:</label><input type="checkbox" id="me-ai" ${m.ai_enabled?'checked':''}><label>Enemy Difficulty Mult:</label><input type="number" id="me-edm" value="${m.enemy_difficulty_multiplier||1.0}" step="0.1">`;
      else if (mt === 'RestrictedUnits') ext.innerHTML = `<label>Allowed Kinds (comma-sep):</label><input type="text" id="me-ak" value="${(m.allowed_kinds||[]).join(',')}" style="width:200px"><label>Max Count:</label><input type="number" id="me-mc" value="${m.max_unit_count||''}" placeholder="unlimited">`;
      else ext.innerHTML = '';
    };
    updateExtra();
    overlay.querySelector('#me-type').onchange = updateExtra;

    overlay.querySelector('#me-save').onclick = () => {
      const mt = overlay.querySelector('#me-type').value;
      const newM = {type: mt};
      const gv = (id) => overlay.querySelector(id)?.value;
      const gi = (id, def) => { const v = parseInt(gv(id)); return isNaN(v) ? def : v; };
      const gf = (id, def) => { const v = parseFloat(gv(id)); return isNaN(v) ? def : v; };
      const gc = (id) => overlay.querySelector(id)?.checked||false;
      if (mt === 'TimeLimit') { newM.max_ticks = gi('#me-max',3000); newM.warning_at = gi('#me-warn',2500); }
      else if (mt === 'AiOnlyControl') { newM.tool_tier = gi('#me-tier',0); }
      else if (mt === 'DamageMultiplier' || mt === 'SpeedMultiplier') { newM.player_multiplier = gf('#me-pmult',1.0); newM.enemy_multiplier = gf('#me-emult',1.0); }
      else if (mt === 'ResourceScarcity') { newM.food_multiplier = gf('#me-fmult',1.0); newM.gpu_multiplier = gf('#me-gmult',1.0); }
      else if (mt === 'DenseFog') { newM.vision_reduction = gi('#me-vr',2); }
      else if (mt === 'DamageZone') { newM.damage_per_tick = gi('#me-cd',1); newM.active_from_start = gc('#me-afs'); newM.toggle_flag = gv('#me-tf')||null; newM.tiles = m.tiles || []; }
      else if (mt === 'Tremors') { newM.interval_ticks = gi('#me-int',100); newM.building_damage = gi('#me-bd',25); newM.terrain_change_chance = gi('#me-tcc',10); newM.epicenter_radius = gi('#me-rad',5); newM.initial_delay_ticks = gi('#me-delay',0); }
      else if (mt === 'LavaRise') { newM.interval_ticks = gi('#me-int',100); newM.damage_per_tick = gi('#me-dmg',10); newM.direction = gv('#me-dir')||'South'; newM.rows_per_wave = gi('#me-rpw',1); newM.initial_delay_ticks = gi('#me-delay',0); }
      else if (mt === 'Flooding') { newM.interval_ticks = gi('#me-int',60); newM.initial_water_level = gi('#me-il',0); newM.max_water_level = gi('#me-ml',3); newM.initial_delay_ticks = gi('#me-delay',0); }
      else if (mt === 'WindStorm') { newM.direction = gv('#me-dir')||'North'; newM.force = gi('#me-force',1); newM.interval_ticks = gi('#me-int',50); newM.duration_ticks = gi('#me-dur',10); newM.can_push_off_map = gc('#me-pom'); newM.initial_delay_ticks = gi('#me-delay',0); }
      else if (mt === 'ToxicTide') { newM.interval_ticks = gi('#me-int',40); newM.damage_per_tick = gi('#me-dmg',5); newM.rows_per_wave = gi('#me-rpw',1); newM.initial_delay_ticks = gi('#me-delay',0); newM.min_safe_radius = gi('#me-msr',8); }
      else if (mt === 'VoiceOnlyControl') { newM.ai_enabled = gc('#me-ai'); newM.enemy_difficulty_multiplier = gf('#me-edm',1.0); }
      else if (mt === 'RestrictedUnits') { newM.allowed_kinds = (gv('#me-ak')||'').split(',').map(s=>s.trim()).filter(Boolean); newM.max_unit_count = gi('#me-mc',0)||null; }
      this.state.mutators[idx] = newM;
      document.body.removeChild(overlay);
      this._updatePanel();
    };
    overlay.querySelector('#me-cancel').onclick = () => document.body.removeChild(overlay);
  }

  // ===========================================================================
  // STATUS BAR
  // ===========================================================================
  _updateStatus() {
    const g = this.hoverGrid;
    document.getElementById('st-pos').textContent = g ? `${g.x}, ${g.y}` : '--';
    if (g && g.x >= 0 && g.y >= 0 && g.x < this.state.width && g.y < this.state.height) {
      const ti = this.state.getTerrain(g.x, g.y);
      document.getElementById('st-terrain').textContent = TERRAIN_TYPES[ti] || '--';
      document.getElementById('st-elev').textContent = 'Elev: ' + this.state.getElev(g.x, g.y);
    } else {
      document.getElementById('st-terrain').textContent = '--';
      document.getElementById('st-elev').textContent = '--';
    }
    document.getElementById('st-zoom').textContent = this.renderer.zoom.toFixed(2) + 'x';
    document.getElementById('st-tool').textContent = this.tool;
  }

  _statusMsg(msg) {
    document.getElementById('st-tool').textContent = msg;
    setTimeout(() => this._updateStatus(), 3000);
  }

  // ===========================================================================
  // RENDER LOOP
  // ===========================================================================
  _render() {
    this.renderer.render(this.state, this);
  }

  // ===========================================================================
  // LOCAL STORAGE AUTO-SAVE
  // ===========================================================================
  _autoSave() {
    try {
      const data = JSON.stringify({
        state: {
          id: this.state.id, name: this.state.name, act: this.state.act,
          mission_index: this.state.mission_index, width: this.state.width,
          height: this.state.height, tiles: this.state.tiles,
          elevation: Array.from(this.state.elevation),
          units: this.state.units, buildings: this.state.buildings,
          heroes: this.state.heroes, enemy_waves: this.state.enemy_waves,
          objectives: this.state.objectives, triggers: this.state.triggers,
          dialogue: this.state.dialogue, briefing_text: this.state.briefing_text,
          debrief_text: this.state.debrief_text, ai_tool_tier: this.state.ai_tool_tier,
          next_mission: this.state.next_mission, mutators: this.state.mutators,
          starting_food: this.state.starting_food, starting_gpu: this.state.starting_gpu,
          starting_nfts: this.state.starting_nfts,
        }
      });
      localStorage.setItem('cc_map_editor', data);
    } catch (e) { /* localStorage might be full or unavailable */ }
  }

  _autoLoad() {
    try {
      const raw = localStorage.getItem('cc_map_editor');
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data && data.state && data.state.width) {
        const s = data.state;
        this.state.id = s.id || 'untitled';
        this.state.name = s.name || 'New Mission';
        this.state.act = s.act || 0;
        this.state.mission_index = s.mission_index || 0;
        this.state.width = s.width;
        this.state.height = s.height;
        this.state.tiles = s.tiles;
        this.state.elevation = new Uint8Array(s.elevation);
        this.state.units = s.units || [];
        this.state.buildings = s.buildings || [];
        this.state.heroes = s.heroes || [];
        this.state.enemy_waves = s.enemy_waves || [];
        this.state.objectives = s.objectives || [];
        this.state.triggers = s.triggers || [];
        this.state.dialogue = s.dialogue || [];
        this.state.briefing_text = s.briefing_text || '';
        this.state.debrief_text = s.debrief_text || '';
        this.state.ai_tool_tier = s.ai_tool_tier;
        this.state.next_mission = s.next_mission || {type:'None'};
        this.state.mutators = s.mutators || [];
        this.state.starting_food = s.starting_food || 0;
        this.state.starting_gpu = s.starting_gpu || 0;
        this.state.starting_nfts = s.starting_nfts || 0;
        this.undo.snapshot(this.state);
        this.renderer.centerOnMap(this.state);
        this._statusMsg('Restored from auto-save');
      }
    } catch (e) { /* ignore corrupt auto-save */ }
  }
}

// ===========================================================================
// BOOT
// ===========================================================================
window.addEventListener('DOMContentLoaded', () => {
  window.app = new App();
});
</script>
</body>
</html>
