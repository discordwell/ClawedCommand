# Devstral Small 2 (24B) QLoRA fine-tuning config — Lua script generation
# This trains on Lua code generation examples (gold_lua_examples.jsonl),
# NOT MCP tool-call format. The model learns to emit Lua scripts that call
# ScriptContext methods, rather than JSON tool-call messages.
#
# Hardware: 1x L40S 48GB (Brev)
# Framework: PEFT + TRL SFTTrainer + BitsAndBytes 4-bit
# VRAM usage: ~22GB (model 13GB + LoRA/activations 9GB)
# Training time: ~90 min on L40S (~$2)
#
# Key discoveries:
# - Devstral Small 2 ships as Mistral3ForConditionalGeneration (multimodal wrapper)
# - config.json has vLLM-specific quantization_config (fp8) — must strip it
# - tokenizer_config.json uses TokenizersBackend — must patch to PreTrainedTokenizerFast
# - extra_special_tokens is list format — must convert to dict for older transformers
# - Weights on disk are bf16 (not fp8), so BnB 4-bit quantization works directly

model:
  name: "mistralai/Devstral-Small-2-24B-Instruct-2512"
  max_seq_len: 2048              # Lua scripts avg ~500 tokens, 2048 is plenty
  load_in_4bit: true              # QLoRA — 13GB VRAM for 24B model
  dtype: "bfloat16"

lora:
  rank: 32
  alpha: 64
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "./outputs/devstral_24b_lua_qlora_v1"
  learning_rate: 2.0e-4
  num_epochs: 3
  per_device_batch_size: 1        # 4-bit model + LoRA, batch 1 for safety
  gradient_accumulation_steps: 32  # Effective batch size = 32
  warmup_ratio: 0.1
  weight_decay: 0.01
  optimizer: "adamw_8bit"
  lr_scheduler_type: "cosine"
  bf16: true
  seed: 42
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  max_grad_norm: 1.0

data:
  train_file: "../data/combined_lua.jsonl"
  eval_file: "../data/gold_lua_examples.jsonl"  # Gold set as eval holdout
  chat_template: "mistral"        # Use Mistral's native chat template
