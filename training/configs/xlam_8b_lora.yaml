# xLAM-2-8B (Salesforce) LoRA fine-tuning config — stretch goal
# Hardware: Any GPU (consumer-grade is fine)
# Framework: Unsloth + TRL SFTTrainer
# Purpose-built for function calling. Very fast training iterations.

model:
  name: "Salesforce/xLAM-2-8b-fc-r"
  max_seq_len: 4096
  load_in_4bit: false          # Small enough for full precision on most GPUs
  dtype: "bfloat16"

lora:
  rank: 32
  alpha: 64
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "./outputs/xlam_8b_cc_v1"
  learning_rate: 2.0e-4
  num_epochs: 3
  per_device_batch_size: 8      # Smaller model = larger batch fits
  gradient_accumulation_steps: 4   # Effective batch size = 32
  warmup_ratio: 0.1
  weight_decay: 0.01
  optimizer: "adamw_8bit"
  lr_scheduler_type: "cosine"
  bf16: true
  seed: 42
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  max_grad_norm: 1.0

data:
  train_file: "../data/cc_train_xlam.jsonl"
  eval_file: "../data/cc_eval_xlam.jsonl"
  chat_template: "xlam"         # xLAM uses its own tool format

inference:
  engine: "vllm"
  quantization: null
  gpu_memory_utilization: 0.9
  max_model_len: 4096
