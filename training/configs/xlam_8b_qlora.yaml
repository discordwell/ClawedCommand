# xLAM-2-8B (Salesforce) QLoRA fine-tuning config
# Hardware: 1x L40S 48GB (Brev) — overkill but consistent environment
# Framework: Unsloth + TRL SFTTrainer
# Budget: ~$4 for 2 runs (~$2 each, ~0.75 hrs on L40S at ~$1.25/hr)
# Note: For final full-LoRA run on A100 80GB, use xlam_8b_lora.yaml
# Purpose-built for function calling. Fastest training iterations.

model:
  name: "Salesforce/xLAM-2-8b-fc-r"
  max_seq_len: 4096
  load_in_4bit: true              # QLoRA — 8B model, very comfortable on any GPU
  dtype: "bfloat16"

lora:
  rank: 32
  alpha: 64
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "./outputs/xlam_8b_qlora_cc_v1"
  learning_rate: 2.0e-4
  num_epochs: 3
  per_device_batch_size: 4        # QLoRA 8B could go higher, but 4 is safe
  gradient_accumulation_steps: 8   # Effective batch size = 32
  warmup_ratio: 0.1
  weight_decay: 0.01
  optimizer: "adamw_8bit"
  lr_scheduler_type: "cosine"
  bf16: true
  seed: 42
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  max_grad_norm: 1.0

data:
  train_file: "../data/cc_train_xlam.jsonl"
  eval_file: "../data/cc_eval_xlam.jsonl"
  chat_template: "xlam"           # xLAM uses its own tool format

inference:
  engine: "vllm"
  quantization: null              # 8B fits in full precision for inference
  gpu_memory_utilization: 0.9
  max_model_len: 4096
