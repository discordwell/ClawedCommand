# Knowledge distillation configuration
#
# Three-component loss:
#   L = alpha * L_KD + (1 - alpha) * L_CE + beta * L_feature
#
# L_KD:      KL divergence between softened teacher/student distributions (× T²)
# L_CE:      Standard cross-entropy against hard labels
# L_feature: MSE between student pooled features and projected teacher features

distillation:
  temperature: 4.0           # Softens logit distributions for inter-class similarity
  alpha: 0.7                 # 70% KD loss, 30% hard label loss
  beta: 0.1                  # Feature hint loss weight

  # Progressive temperature annealing (sharpen targets over training)
  anneal_temperature: true
  temp_start: 6.0
  temp_end: 2.0

training:
  epochs: 200
  batch_size: 128
  learning_rate: 0.01
  weight_decay: 0.001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 10
  seed: 42

teacher:
  # Teacher model architecture
  channels: [64, 96, 128, 192, 256]
  dropout: 0.1
  feature_dim: 256           # Teacher's pre-FC feature dimension

student:
  # Student model architecture (matches existing config.yaml)
  channels: [32, 48, 64, 96]
  feature_dim: 96            # Student's pre-FC feature dimension

# Teacher training phases
teacher_pretrain:
  epochs: 80
  batch_size: 128
  learning_rate: 0.003
  weight_decay: 0.001
  warmup_epochs: 5
  num_classes: 35            # Google Speech Commands v2

teacher_finetune:
  epochs: 120
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.001
  warmup_epochs: 3
  freeze_epochs: 10          # Freeze early layers for first N epochs
  freeze_blocks: 2           # Number of temporal blocks to freeze
  label_smoothing: 0.1       # Prevents near-one-hot soft targets
  mixup_alpha: 0.2           # Mixup regularization strength
  num_classes: 118           # Game vocabulary

# Post-distillation student fine-tuning
student_finetune:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.001
  warmup_epochs: 3
  label_smoothing: 0.0       # No smoothing — maximize confidence
