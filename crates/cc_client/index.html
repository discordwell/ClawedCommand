<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawedCommand</title>
    <link data-trunk rel="rust" data-cargo-no-default-features data-cargo-features="wasm-agent" />
    <link data-trunk rel="copy-dir" href="../../assets" />
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f1a; }
        canvas { display: block; width: 100%; height: 100%; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0f0f1a; color: #ccc;
            font-family: monospace; font-size: 18px;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333; border-top-color: #ff8844;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading ClawedCommand...</div>
    </div>
    <script>
        // Remove loading screen once the WASM canvas appears
        const observer = new MutationObserver(() => {
            if (document.querySelector('canvas')) {
                document.getElementById('loading')?.classList.add('hidden');
                setTimeout(() => document.getElementById('loading')?.remove(), 600);
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
    <!-- WebLLM bridge for in-browser AI inference -->
    <script type="module">
        // Lazy-loaded WebLLM — only downloads if the user selects WebGPU provider
        window.ccWebLLM = {
            _engine: null,
            _status: 'idle',
            _downloadProgress: 0,

            isAvailable() {
                return typeof navigator !== 'undefined' && !!navigator.gpu;
            },

            status() {
                return this._status;
            },

            downloadProgress() {
                return this._downloadProgress;
            },

            async init(modelId) {
                if (this._engine) return;
                this._status = 'loading';

                const { CreateMLCEngine } = await import(
                    'https://esm.run/@mlc-ai/web-llm'
                );

                this._engine = await CreateMLCEngine(modelId, {
                    initProgressCallback: (progress) => {
                        this._downloadProgress = progress.progress || 0;
                        this._status = `loading: ${(this._downloadProgress * 100).toFixed(0)}%`;
                    },
                });
                this._status = 'ready';
            },

            async complete(messagesJson, toolsJson) {
                if (!this._engine) throw new Error('WebLLM not initialized');
                const messages = JSON.parse(messagesJson);
                const tools = JSON.parse(toolsJson);

                const request = { messages };
                if (tools && tools.length > 0) {
                    request.tools = tools;
                }

                const response = await this._engine.chat.completions.create(request);
                return JSON.stringify(response);
            },
        };
    </script>
</body>
</html>
